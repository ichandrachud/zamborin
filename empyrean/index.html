<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <title>Empyrean — A Zamborin Game</title>
  <meta name="description" content="A free-flight dogfight over a hand-painted city. Strafe enemy planes, drop bombs on tanks and turrets, clear the stage. A Zamborin sortie." />
  <meta name="theme-color" content="#0E1726" />
  <link rel="canonical" href="https://zamborin.com/empyrean/" />
  <link rel="icon" type="image/svg+xml" href="/images/zamborin-favicon.svg" />
  <!-- iPhone "Add to Home Screen" support — when launched from the home
       screen the address bar is gone entirely. The runtime fullscreen API
       isn't reliable on iPhone Safari, so this is the practical way to
       claim the whole screen. -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Empyrean" />
  <meta name="theme-color" content="#0E1424" />

  <!-- Open Graph / Twitter -->
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="Zamborin Games" />
  <meta property="og:url" content="https://zamborin.com/empyrean/" />
  <meta property="og:title" content="Empyrean — Free-flight dogfight over hand-painted skies" />
  <meta property="og:description" content="Pick a plane or chopper, equip your bombs, and clear hand-painted cities and oceans of every threat. A Zamborin sortie." />
  <meta property="og:image" content="https://zamborin.com/images/empyrean-og.jpg" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta property="og:image:alt" content="Empyrean — hand-painted dogfight over a vibrant city skyline." />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Empyrean — Free-flight dogfight over hand-painted skies" />
  <meta name="twitter:description" content="Pick a plane or chopper, equip your bombs, and clear hand-painted cities and oceans of every threat." />
  <meta name="twitter:image" content="https://zamborin.com/images/empyrean-og.jpg" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../shared/tokens.css" />
  <link rel="stylesheet" href="../shared/chrome.css?v=8" />
  <link rel="stylesheet" href="./play.css?v=1" />
  <!-- Google AdSense -->
  <meta name="google-adsense-account" content="ca-pub-9207689324865969">
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-9207689324865969" crossorigin="anonymous"></script>
  <!-- Structured data: VideoGame schema -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "VideoGame",
    "name": "Empyrean",
    "description": "Free-flight WWII dogfight over hand-painted skies — city, ocean, and desert missions.",
    "url": "https://zamborin.com/empyrean/",
    "image": "https://zamborin.com/images/empyrean-og.jpg",
    "playMode": "SinglePlayer",
    "gamePlatform": "Web Browser",
    "applicationCategory": "Game",
    "operatingSystem": "Web",
    "genre": ["Action","Arcade","Flight"],
    "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" },
    "publisher": { "@type": "Organization", "name": "Zamborin Games", "url": "https://zamborin.com/" }
  }
  </script>
</head>
<body>
  <header class="site-header">
    <a class="brand" href="/" aria-label="Zamborin Games home">
      <img class="brand-logo" src="/images/zamborin-logo.svg" alt="Zamborin" />
    </a>
    <div class="header-right">
      <button id="focus-toggle" class="focus-btn" type="button" aria-label="Play fullscreen" aria-pressed="false">
        <svg class="icon-enter" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <polyline points="4 9 4 4 9 4"/>
          <polyline points="20 9 20 4 15 4"/>
          <polyline points="4 15 4 20 9 20"/>
          <polyline points="20 15 20 20 15 20"/>
        </svg>
        <svg class="icon-exit" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M6 6l12 12M18 6L6 18"/>
        </svg>
      </button>
      <a class="back-link" href="/">Back to all games</a>
    </div>
  </header>

  <main class="page">
    <!-- Above-fold ad slot. Empty by default; AdSense fills when wired. -->
    <div class="ad-slot ad-slot-top" id="ad-top" aria-hidden="true"></div>

    <section class="play-row">
      <div class="game-wrap">
        <canvas id="game" aria-label="Empyrean — free-flight city dogfight"></canvas>
      </div>
    </section>

    <!-- Below-fold ad slot — primary revenue slot. -->
    <div class="ad-slot ad-slot-bottom" id="ad-bottom" aria-hidden="true"></div>
  </main>

  <!-- Rotate-device hint, shown when the phone is in portrait orientation. -->
  <div id="rotate-prompt" class="rotate-prompt" aria-live="polite">
    <svg class="rotate-icon" viewBox="0 0 24 24" width="84" height="84" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <rect x="3" y="6" width="14" height="12" rx="1.5"/>
      <circle cx="15" cy="12" r="0.5" fill="currentColor"/>
      <path d="M19 14.5a7 7 0 0 1 -7 7"/>
      <polyline points="14.5 18 12 21.5 9.5 18"/>
    </svg>
    <h2>Rotate your device</h2>
    <p>Empyrean plays in landscape.</p>
  </div>

  <footer class="site-footer">
    <span>A Zamborin Game</span><nav class="site-foot-nav"><a href="/about/">About</a><a href="/privacy/">Privacy</a><a href="/contact/">Contact</a></nav>
  </footer>

  <script src="./play.js?v=66"></script>
  <script>
    (() => {
      const btn = document.getElementById('focus-toggle');
      btn.addEventListener('click', () => {
        const on = document.body.classList.toggle('focus-mode');
        btn.setAttribute('aria-pressed', on ? 'true' : 'false');
        btn.setAttribute('aria-label', on ? 'Exit fullscreen' : 'Play fullscreen');
        setTimeout(() => window.dispatchEvent(new Event('resize')), 60);
      });
    })();
  </script>
  <script defer src="/_vercel/insights/script.js"></script>
</body>
</html>
