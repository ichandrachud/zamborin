<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <title>TESSERA Words — Endless word puzzle</title>
  <meta name="description" content="Stack falling letter tiles into words. The longer the word, the more the points. The game gets faster the longer you survive. Free." />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../shared/tokens.css" />
  <link rel="stylesheet" href="../shared/chrome.css" />
  <link rel="stylesheet" href="./play.css?v=2" />
</head>
<body>
  <button id="focus-toggle" class="focus-btn" type="button" aria-label="Toggle phone-view focus mode" aria-pressed="false">
    <!-- enter-focus icon: landscape phone outline -->
    <svg class="icon-enter" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <rect x="2" y="6" width="20" height="12" rx="2.5"/>
      <circle cx="19" cy="12" r="0.9" fill="currentColor" stroke="none"/>
    </svg>
    <!-- exit-focus icon: close (×) -->
    <svg class="icon-exit" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <path d="M6 6l12 12M18 6L6 18"/>
    </svg>
  </button>

  <header class="site-header">
    <div class="brand">
      <span class="brand-mark">TESSERA</span>
    </div>
  </header>

  <main class="page">
    <!-- Top leaderboard ad: 728×90 -->
    <div class="ad-slot ad-leaderboard" aria-label="Advertisement">
      <span class="ad-label">AD · 728 × 90</span>
    </div>

    <!-- Main play area: 760×570 game left, two 300×250 stacked right -->
    <section class="play-row">
      <div class="game-wrap">
        <canvas id="game" aria-label="Word puzzle"></canvas>
        <!-- Splash sits ABOVE the canvas, INSIDE the game card. Visible for 2 s
             on load, then fades and removes itself. -->
        <div id="splash" class="splash" aria-hidden="true"></div>
      </div>
      <aside class="sidebar">
        <div class="ad-slot ad-medrec" aria-label="Advertisement">
          <span class="ad-label">AD · 300 × 250</span>
        </div>
        <div class="ad-slot ad-medrec" aria-label="Advertisement">
          <span class="ad-label">AD · 300 × 250</span>
        </div>
      </aside>
    </section>

    <!-- Bottom leaderboard ad: 728×90 -->
    <div class="ad-slot ad-leaderboard" aria-label="Advertisement">
      <span class="ad-label">AD · 728 × 90</span>
    </div>
  </main>

  <footer class="site-footer">
    <span>A Zamborin Game</span>
  </footer>

  <script src="./play.js?v=1"></script>
  <script>
    // Focus / phone-view toggle: hides chrome, scales canvas to fit viewport.
    // Always-on automatically below 1100 px (handled in CSS), button stays as the
    // explicit on-desktop "preview as phone" affordance.
    (() => {
      const btn = document.getElementById('focus-toggle');
      btn.addEventListener('click', () => {
        const on = document.body.classList.toggle('focus-mode');
        btn.setAttribute('aria-pressed', on ? 'true' : 'false');
        btn.setAttribute('aria-label', on ? 'Exit phone-view focus mode' : 'Enter phone-view focus mode');
        // Canvas reads its own CSS dimensions on resize; trigger one so the backing store updates.
        setTimeout(() => window.dispatchEvent(new Event('resize')), 60);
      });
    })();

    // Splash: visible 2 s, fades over 600 ms, then removed so it never
    // blocks pointer events on the game canvas underneath. Once it's gone,
    // fires a `splash-done` event so play.js can spawn the first tile.
    (() => {
      const splash = document.getElementById('splash');
      if (!splash) return;
      setTimeout(() => splash.classList.add('fading'), 2000);
      setTimeout(() => {
        splash.remove();
        window.dispatchEvent(new CustomEvent('splash-done'));
      }, 2700);
    })();
  </script>
</body>
</html>
