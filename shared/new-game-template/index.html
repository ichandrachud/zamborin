<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <title>__GAME_NAME__ — A Zamborin Game</title>
  <meta name="description" content="__GAME_DESCRIPTION__" />
  <link rel="icon" type="image/svg+xml" href="/images/zamborin-favicon.svg" />

  <!-- Open Graph / Twitter -->
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="Zamborin Games" />
  <meta property="og:url" content="https://zamborin.com/__GAME_SLUG__/" />
  <meta property="og:title" content="__GAME_NAME__ — __GAME_TAGLINE__" />
  <meta property="og:description" content="__GAME_DESCRIPTION__" />
  <meta property="og:image" content="https://zamborin.com/images/__GAME_SLUG__-og.jpg" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta property="og:image:alt" content="__GAME_OG_ALT__" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="__GAME_NAME__ — __GAME_TAGLINE__" />
  <meta name="twitter:description" content="__GAME_DESCRIPTION__" />
  <meta name="twitter:image" content="https://zamborin.com/images/__GAME_SLUG__-og.jpg" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../shared/tokens.css" />
  <link rel="stylesheet" href="../shared/chrome.css?v=7" />
  <link rel="stylesheet" href="./play.css?v=1" />
  <!-- Google AdSense -->
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-9207689324865969" crossorigin="anonymous"></script>
</head>
<body>
  <header class="site-header">
    <a class="brand" href="/" aria-label="Zamborin Games home">
      <img class="brand-logo" src="/images/zamborin-logo.svg" alt="Zamborin" />
    </a>
    <div class="header-right">
      <button id="focus-toggle" class="focus-btn" type="button" aria-label="Play fullscreen" aria-pressed="false">
        <svg class="icon-enter" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <polyline points="4 9 4 4 9 4"/>
          <polyline points="20 9 20 4 15 4"/>
          <polyline points="4 15 4 20 9 20"/>
          <polyline points="20 15 20 20 15 20"/>
        </svg>
        <svg class="icon-exit" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M6 6l12 12M18 6L6 18"/>
        </svg>
      </button>
      <a class="back-link" href="/">Back to all games</a>
    </div>
  </header>

  <main class="page">
    <section class="play-row">
      <div class="game-wrap">
        <canvas id="game" aria-label="__GAME_NAME__"></canvas>
        <!-- Splash: shows for 2 s at load, then fades to reveal the game. -->
        <div id="splash" class="splash" aria-hidden="true"></div>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <span>A Zamborin Game</span>
  </footer>

  <!-- Shared toolkit: audio + input. ALWAYS load before play.js. -->
  <script src="../shared/sfx.js?v=1"></script>
  <script src="../shared/input.js?v=1"></script>
  <script src="./play.js?v=1"></script>
  <script>
    (() => {
      const btn = document.getElementById('focus-toggle');
      btn.addEventListener('click', () => {
        const on = document.body.classList.toggle('focus-mode');
        btn.setAttribute('aria-pressed', on ? 'true' : 'false');
        btn.setAttribute('aria-label', on ? 'Exit fullscreen' : 'Play fullscreen');
        setTimeout(() => window.dispatchEvent(new Event('resize')), 60);
      });
    })();

    // Splash: 2 s visible, 0.6 s fade, then remove. After it's gone, fire
    // a `splash-done` event so play.js can spawn the first thing.
    (() => {
      const splash = document.getElementById('splash');
      if (!splash) return;
      setTimeout(() => splash.classList.add('fading'), 2000);
      setTimeout(() => {
        splash.remove();
        window.dispatchEvent(new CustomEvent('splash-done'));
      }, 2700);
    })();
  </script>
</body>
</html>
