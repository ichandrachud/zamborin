<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 290 600" width="290" height="600">
<defs>
<linearGradient id="cream" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#c2bfb2"/><stop offset="0.5" stop-color="#e6e3d6"/><stop offset="1" stop-color="#c2bfb2"/></linearGradient>
<linearGradient id="steel" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#828891"/><stop offset="0.5" stop-color="#c9ced3"/><stop offset="1" stop-color="#828891"/></linearGradient>
<linearGradient id="dome" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#8b94a0"/><stop offset="0.5" stop-color="#c2cad4"/><stop offset="1" stop-color="#828b98"/></linearGradient>
