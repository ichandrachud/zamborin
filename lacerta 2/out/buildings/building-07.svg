<g>
<rect x="44" y="184" width="62" height="74" rx="2" fill="url(#white)" stroke="#5f625e" stroke-width="1.5"/>
<rect x="50" y="192" width="50" height="50" rx="2" fill="#e8e8e2" stroke="#7e817c" stroke-width="1.5"/><rect x="54" y="196" width="42" height="42" fill="url(#glass)"/><g stroke="#e8e8e2" stroke-width="2.4"><line x1="75" y1="196" x2="75" y2="238"/><line x1="54" y1="217" x2="96" y2="217"/></g>
<line x1="44" y1="250" x2="106" y2="250" stroke="#6a7079" stroke-width="2"/><g stroke="#6a7079" stroke-width="1.4"><line x1="50" y1="250" x2="50" y2="258"/><line x1="75" y1="250" x2="75" y2="258"/><line x1="100" y1="250" x2="100" y2="258"/></g>
</g>
<!-- salmon-framed window right -->
<g><rect x="146" y="200" width="44" height="54" rx="2" fill="#cf7e6a" stroke="#8a4636" stroke-width="1.8"/><rect x="150" y="204" width="36" height="46" fill="url(#glass)"/><g stroke="#cf7e6a" stroke-width="2.4"><line x1="168" y1="204" x2="168" y2="250"/><line x1="150" y1="227" x2="186" y2="227"/></g></g>
<!-- green door + red panel -->
