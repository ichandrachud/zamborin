<g><rect x="146" y="470" width="48" height="90" rx="3" fill="#b25744" stroke="#7a3527" stroke-width="1.5"/><rect x="152" y="478" width="36" height="40" fill="url(#glass)"/><g stroke="#8a4636" stroke-width="2"><line x1="170" y1="478" x2="170" y2="518"/></g><line x1="152" y1="528" x2="188" y2="528" stroke="#7a3527" stroke-width="1.2"/></g>
<!-- foot -->
<path d="M 46 560 L 56 542 Q 94 548 130 544 Q 170 548 204 542 L 214 560 Z" fill="url(#steel)" stroke="#5f625e" stroke-width="1.5"/>
</svg>
