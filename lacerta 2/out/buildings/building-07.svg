<rect x="68" y="150" width="124" height="12" rx="3" fill="url(#steel)" stroke="#5f625e" stroke-width="1.5"/>
<path d="M 70 152 Q 130 112 190 152 Z" fill="url(#steel)" stroke="#5f625e" stroke-width="1.5"/>
<ellipse cx="108" cy="134" rx="26" ry="7" fill="#ffffff" opacity="0.2"/>
