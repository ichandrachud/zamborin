<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 250 600" width="250" height="600">
<defs>
<linearGradient id="olive" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#6f7560"/><stop offset="0.5" stop-color="#9ca08a"/><stop offset="1" stop-color="#6f7560"/></linearGradient>
<linearGradient id="steel" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#828891"/><stop offset="0.5" stop-color="#c9ced3"/><stop offset="1" stop-color="#828891"/></linearGradient>
<linearGradient id="glass" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#c4d2da"/><stop offset="1" stop-color="#7c8b96"/></linearGradient>
</defs>
<line x1="0" y1="560" x2="250" y2="560" stroke="#b4b6b3" stroke-width="2"/>
<!-- pipes -->
<path d="M 182 300 L 182 200 Q 182 194 176 194" fill="none" stroke="#5e6573" stroke-width="6"/><path d="M 182 300 L 184 522" fill="none" stroke="url(#steel)" stroke-width="6"/><rect x="177" y="410" width="11" height="6" fill="#525a66"/>
