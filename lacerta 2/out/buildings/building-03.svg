<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 600" width="240" height="600">
<defs>
<linearGradient id="o" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#a85316"/><stop offset="0.5" stop-color="#df8a2e"/><stop offset="1" stop-color="#a85316"/></linearGradient>
<linearGradient id="white" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#aeb1ad"/><stop offset="0.5" stop-color="#dcdcd7"/><stop offset="1" stop-color="#aeb1ad"/></linearGradient>
<linearGradient id="steel" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#828891"/><stop offset="0.5" stop-color="#c9ced3"/><stop offset="1" stop-color="#828891"/></linearGradient>
<linearGradient id="glass" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#c4d2da"/><stop offset="1" stop-color="#7c8b96"/></linearGradient>
</defs>

<line x1="0" y1="560" x2="240" y2="560" stroke="#b4b6b3" stroke-width="2"/>

<!-- white slender shaft + flared base -->
<path d="M 50 560 C 56 508 68 478 72 468 L 68 226 Q 120 220 172 226 L 168 468 C 172 478 184 508 190 560 Z" fill="url(#white)" stroke="#5f625e" stroke-width="1.5"/>
<line x1="70" y1="360" x2="170" y2="360" stroke="#7d807c" stroke-width="1"/>

<!-- side pipe (attached) -->
<path d="M 176 300 L 176 240 Q 176 234 170 234" fill="none" stroke="#6a7079" stroke-width="5"/>
<path d="M 176 300 L 178 520" fill="none" stroke="url(#steel)" stroke-width="5"/>
<rect x="171" y="420" width="10" height="6" fill="#5a6066"/>

<!-- orange watch-drum (overhangs shaft) -->
<path d="M 52 112 C 46 142 46 198 58 224 L 182 224 C 194 198 194 142 188 112 Z" fill="url(#o)" stroke="#5e2c0a" stroke-width="2"/>

<!-- row of tall narrow green-framed windows -->
<g>
<rect x="64" y="132" width="26" height="64" rx="2" fill="#5f7a4e" stroke="#3f5234" stroke-width="1.5"/><rect x="68" y="136" width="18" height="56" fill="url(#glass)"/><line x1="68" y1="164" x2="86" y2="164" stroke="#5f7a4e" stroke-width="2.2"/>
<rect x="98" y="128" width="26" height="68" rx="2" fill="#5f7a4e" stroke="#3f5234" stroke-width="1.5"/><rect x="102" y="132" width="18" height="60" fill="url(#glass)"/><line x1="102" y1="162" x2="120" y2="162" stroke="#5f7a4e" stroke-width="2.2"/>
<rect x="132" y="128" width="26" height="68" rx="2" fill="#5f7a4e" stroke="#3f5234" stroke-width="1.5"/><rect x="136" y="132" width="18" height="60" fill="url(#glass)"/><line x1="136" y1="162" x2="154" y2="162" stroke="#5f7a4e" stroke-width="2.2"/>
<rect x="166" y="132" width="22" height="64" rx="2" fill="#5f7a4e" stroke="#3f5234" stroke-width="1.5"/><rect x="170" y="136" width="14" height="56" fill="url(#glass)"/><line x1="170" y1="164" x2="184" y2="164" stroke="#5f7a4e" stroke-width="2.2"/>
</g>

<!-- steel deck rim -->
<rect x="46" y="104" width="148" height="14" rx="3" fill="url(#steel)" stroke="#5f625e" stroke-width="1.5"/>
<ellipse cx="120" cy="106" rx="74" ry="7" fill="url(#steel)" stroke="#5f625e" stroke-width="1.2"/>

<!-- antenna mast + side dish -->
<line x1="108" y1="104" x2="108" y2="40" stroke="#6a7079" stroke-width="2.5"/>
<g stroke="#6a7079" stroke-width="2"><line x1="98" y1="56" x2="118" y2="56"/><line x1="100" y1="66" x2="116" y2="66"/><line x1="102" y1="76" x2="114" y2="76"/></g>
<circle cx="108" cy="40" r="3" fill="#787e86"/>
<circle cx="160" cy="84" r="11" fill="url(#steel)" stroke="#5f625e" stroke-width="1.5"/><circle cx="160" cy="84" r="4.5" fill="#2b2e31"/>

<!-- shaft windows -->
<g><rect x="100" y="300" width="40" height="50" rx="2" fill="#e8e8e2" stroke="#7e817c" stroke-width="1.5"/><rect x="104" y="304" width="32" height="42" fill="url(#glass)"/><g stroke="#e8e8e2" stroke-width="2.4"><line x1="120" y1="304" x2="120" y2="346"/><line x1="104" y1="325" x2="136" y2="325"/></g></g>

<!-- green door + red awning -->
<g>
<rect x="96" y="486" width="48" height="74" rx="3" fill="url(#steel)" stroke="#5f625e" stroke-width="1.5"/>
<rect x="102" y="492" width="36" height="68" fill="#5f8a4a"/><line x1="120" y1="492" x2="120" y2="560" stroke="#3f5234" stroke-width="1.2"/><circle cx="132" cy="528" r="2.4" fill="#23321c"/>
<path d="M 90 486 L 150 486 L 144 470 L 96 470 Z" fill="#bb3a24" stroke="#7a1f16" stroke-width="1.2"/>
</g>

<!-- flared foot -->
<path d="M 44 560 L 54 542 Q 92 548 120 544 Q 150 548 186 542 L 196 560 Z" fill="url(#steel)" stroke="#5f625e" stroke-width="1.5"/>
</svg>
