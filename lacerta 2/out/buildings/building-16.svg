<rect x="44" y="184" width="56" height="68" rx="3" fill="url(#slate)" stroke="#444b57" stroke-width="1.5"/>
<rect x="50" y="192" width="44" height="46" rx="2" fill="#e8e8e2" stroke="#7e817c" stroke-width="1.5"/><rect x="54" y="196" width="36" height="38" fill="url(#glass)"/><g stroke="#e8e8e2" stroke-width="2.4"><line x1="72" y1="196" x2="72" y2="234"/><line x1="54" y1="215" x2="90" y2="215"/></g>
<line x1="44" y1="246" x2="100" y2="246" stroke="#586273" stroke-width="2"/>
</g>
