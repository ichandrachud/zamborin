<g stroke="#3a3f44" stroke-width="5" stroke-linecap="round"><line x1="120" y1="74" x2="184" y2="36"/><line x1="124" y1="81" x2="188" y2="43"/><line x1="116" y1="67" x2="180" y2="29"/></g>
<path d="M 178 44 L 194 28 L 188 23 L 172 39 Z" fill="#4a5057" stroke="#23262a" stroke-width="1"/>
<path d="M 100 79 C 84 77 82 63 94 59" fill="none" stroke="#6a7079" stroke-width="3.5"/>
</g>
<!-- projecting bay window (upper-left) -->
