<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 250 600" width="250" height="600">
<defs>
<linearGradient id="white" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#aeb1ad"/><stop offset="0.5" stop-color="#dcdcd7"/><stop offset="1" stop-color="#aeb1ad"/></linearGradient>
<linearGradient id="steel" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#828891"/><stop offset="0.5" stop-color="#c9ced3"/><stop offset="1" stop-color="#828891"/></linearGradient>
<linearGradient id="red" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#9a2c1c"/><stop offset="0.5" stop-color="#cc4a36"/><stop offset="1" stop-color="#9a2c1c"/></linearGradient>
<radialGradient id="rdome" cx="0.36" cy="0.3" r="0.9"><stop offset="0" stop-color="#cc4a36"/><stop offset="1" stop-color="#7e2316"/></radialGradient>
<linearGradient id="glass" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#c4d2da"/><stop offset="1" stop-color="#7c8b96"/></linearGradient>
</defs>
<line x1="0" y1="560" x2="250" y2="560" stroke="#b4b6b3" stroke-width="2"/>
<!-- back red tower peeking right -->
<path d="M 150 560 L 150 168 Q 188 162 222 168 L 222 560 Z" fill="url(#red)" stroke="#5e1c12" stroke-width="1.5"/>
<path d="M 150 170 Q 186 142 222 170 Z" fill="url(#rdome)" stroke="#5e1c12" stroke-width="1.5"/>
<g><rect x="170" y="220" width="34" height="56" rx="2" fill="#e8e8e2" stroke="#7e817c" stroke-width="1.5"/><rect x="174" y="224" width="26" height="48" fill="url(#glass)"/><line x1="174" y1="248" x2="200" y2="248" stroke="#e8e8e2" stroke-width="2.2"/></g>
<!-- main white tower -->
<path d="M 46 560 C 52 502 64 320 68 270 L 70 152 Q 116 145 162 152 L 164 270 C 168 320 178 502 184 560 Z" fill="url(#white)" stroke="#5f625e" stroke-width="1.5"/>
<line x1="66" y1="370" x2="166" y2="370" stroke="#7d807c" stroke-width="1"/>
<!-- red dome on white tower + deck -->
<rect x="62" y="128" width="108" height="12" rx="3" fill="url(#steel)" stroke="#5f625e" stroke-width="1.5"/>
<path d="M 66 130 Q 66 98 116 92 Q 166 98 166 130 Z" fill="url(#rdome)" stroke="#5e1c12" stroke-width="1.5"/>
<ellipse cx="96" cy="110" rx="20" ry="7" fill="#ffffff" opacity="0.18"/>
<!-- tall window -->
<g><rect x="92" y="180" width="40" height="72" rx="2" fill="#e8e8e2" stroke="#7e817c" stroke-width="1.5"/><rect x="96" y="184" width="32" height="64" fill="url(#glass)"/><g stroke="#e8e8e2" stroke-width="2.4"><line x1="112" y1="184" x2="112" y2="248"/><line x1="96" y1="206" x2="128" y2="206"/><line x1="96" y1="228" x2="128" y2="228"/></g></g>
<!-- ornate red door -->
<g><rect x="84" y="470" width="52" height="90" rx="4" fill="url(#steel)" stroke="#5f625e" stroke-width="1.5"/><path d="M 90 560 L 90 500 A 20 20 0 0 1 130 500 L 130 560 Z" fill="#b25744" stroke="#7a3527" stroke-width="1.5"/><ellipse cx="110" cy="508" rx="9" ry="7" fill="url(#glass)" stroke="#7a3527" stroke-width="1.4"/><line x1="110" y1="520" x2="110" y2="560" stroke="#7a3527" stroke-width="1.2"/></g>
<!-- foot -->
<path d="M 42 560 L 52 542 Q 90 548 120 544 Q 160 548 188 542 L 198 560 Z" fill="url(#steel)" stroke="#5f625e" stroke-width="1.5"/>
</svg>
