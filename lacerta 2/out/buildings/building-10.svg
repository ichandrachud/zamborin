<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 600" width="240" height="600">
<defs>
<linearGradient id="slate" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#6c7686"/><stop offset="0.5" stop-color="#9aa4b2"/><stop offset="1" stop-color="#6c7686"/></linearGradient>
<linearGradient id="steel" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#828891"/><stop offset="0.5" stop-color="#c9ced3"/><stop offset="1" stop-color="#828891"/></linearGradient>
<radialGradient id="rdome" cx="0.36" cy="0.3" r="0.9"><stop offset="0" stop-color="#cc4a36"/><stop offset="1" stop-color="#7e2316"/></radialGradient>
<linearGradient id="glass" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#c4d2da"/><stop offset="1" stop-color="#7c8b96"/></linearGradient>
</defs>
<line x1="0" y1="560" x2="240" y2="560" stroke="#b4b6b3" stroke-width="2"/>
<!-- slate tower -->
<path d="M 50 560 C 56 502 68 320 72 270 L 74 158 Q 120 151 166 158 L 168 270 C 172 320 184 502 190 560 Z" fill="url(#slate)" stroke="#444b57" stroke-width="1.5"/>
<line x1="72" y1="380" x2="168" y2="380" stroke="#586273" stroke-width="1"/>
<!-- red dome + deck -->
<rect x="66" y="134" width="108" height="12" rx="3" fill="url(#steel)" stroke="#5f625e" stroke-width="1.5"/>
<path d="M 70 136 Q 70 102 120 96 Q 170 102 170 136 Z" fill="url(#rdome)" stroke="#5e1c12" stroke-width="1.5"/>
<ellipse cx="100" cy="116" rx="20" ry="7" fill="#ffffff" opacity="0.16"/>
<!-- prominent front pipes (attached) -->
<path d="M 100 240 L 100 175 Q 100 168 108 168" fill="none" stroke="#5e6573" stroke-width="6"/><path d="M 100 240 L 100 520" fill="none" stroke="url(#steel)" stroke-width="6"/><rect x="95" y="330" width="11" height="6" fill="#525a66"/><rect x="95" y="440" width="11" height="6" fill="#525a66"/>
<path d="M 116 250 L 116 520" fill="none" stroke="url(#steel)" stroke-width="5"/>
<!-- slate bay window (projecting box, left) -->
<g>
<rect x="46" y="250" width="58" height="66" rx="3" fill="url(#slate)" stroke="#444b57" stroke-width="1.5"/>
<rect x="52" y="258" width="46" height="44" rx="2" fill="#e8e8e2" stroke="#7e817c" stroke-width="1.5"/><rect x="56" y="262" width="38" height="36" fill="url(#glass)"/><g stroke="#e8e8e2" stroke-width="2.4"><line x1="75" y1="262" x2="75" y2="298"/><line x1="56" y1="280" x2="94" y2="280"/></g>
<line x1="46" y1="308" x2="104" y2="308" stroke="#586273" stroke-width="2"/>
</g>
<!-- upper window -->
<g><rect x="96" y="180" width="38" height="50" rx="2" fill="#e8e8e2" stroke="#7e817c" stroke-width="1.5"/><rect x="100" y="184" width="30" height="42" fill="url(#glass)"/><g stroke="#e8e8e2" stroke-width="2.2"><line x1="115" y1="184" x2="115" y2="226"/><line x1="100" y1="205" x2="130" y2="205"/></g></g>
<!-- arched door base-right + orange trim -->
<g><rect x="120" y="474" width="48" height="86" rx="4" fill="url(#steel)" stroke="#5f625e" stroke-width="1.5"/><path d="M 126 560 L 126 504 A 18 18 0 0 1 162 504 L 162 560 Z" fill="#e8e8e2" stroke="#7e817c" stroke-width="1.5"/><path d="M 130 506 A 14 14 0 0 1 158 506 L 158 556 L 130 556 Z" fill="url(#glass)"/></g>
<rect x="66" y="528" width="40" height="14" rx="2" fill="#d07a2c" stroke="#8a5316" stroke-width="1.2"/>
<!-- foot -->
<path d="M 46 560 L 56 542 Q 94 548 130 544 Q 170 548 200 542 L 200 560 Z" fill="url(#steel)" stroke="#5f625e" stroke-width="1.5"/>
</svg>
