<rect x="58" y="134" width="88" height="12" rx="3" fill="url(#steel)" stroke="#5f625e" stroke-width="1.5"/>
<path d="M 62 136 Q 62 104 102 98 Q 142 104 142 136 Z" fill="url(#rdome)" stroke="#5e1c12" stroke-width="1.5"/>
<ellipse cx="86" cy="116" rx="16" ry="6" fill="#ffffff" opacity="0.16"/>
