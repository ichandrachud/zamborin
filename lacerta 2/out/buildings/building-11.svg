<g><rect x="72" y="186" width="44" height="40" rx="2" fill="#d07a2c" stroke="#8a5316" stroke-width="1.8"/><g stroke="#8a5316" stroke-width="2.2"><line x1="76" y1="194" x2="112" y2="194"/><line x1="76" y1="202" x2="112" y2="202"/><line x1="76" y1="210" x2="112" y2="210"/><line x1="76" y1="218" x2="112" y2="218"/></g></g>
<!-- window -->
