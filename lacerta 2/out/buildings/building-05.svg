<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 600" width="260" height="600">
<defs>
<linearGradient id="o" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#9c4a14"/><stop offset="0.5" stop-color="#d87a28"/><stop offset="1" stop-color="#9c4a14"/></linearGradient>
<linearGradient id="white" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#aeb1ad"/><stop offset="0.5" stop-color="#dcdcd7"/><stop offset="1" stop-color="#aeb1ad"/></linearGradient>
<linearGradient id="steel" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#828891"/><stop offset="0.5" stop-color="#c9ced3"/><stop offset="1" stop-color="#828891"/></linearGradient>
<linearGradient id="slate" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#6c7686"/><stop offset="0.5" stop-color="#9aa4b2"/><stop offset="1" stop-color="#6c7686"/></linearGradient>
<linearGradient id="glass" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#c4d2da"/><stop offset="1" stop-color="#7c8b96"/></linearGradient>
<linearGradient id="cop" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#8a5e34"/><stop offset="0.5" stop-color="#cda978"/><stop offset="1" stop-color="#8a5e34"/></linearGradient>
</defs>

<line x1="0" y1="560" x2="260" y2="560" stroke="#b4b6b3" stroke-width="2"/>

<!-- side pipe (attached) -->
<path d="M 188 320 L 188 240 Q 188 234 182 234" fill="none" stroke="#6a7079" stroke-width="6"/>
<path d="M 188 320 L 190 522" fill="none" stroke="url(#steel)" stroke-width="6"/>
<rect x="184" y="430" width="10" height="6" fill="#5a6066"/>

<!-- white tapering tower + flared base -->
<path d="M 52 560 C 58 500 72 330 76 286 L 78 178 Q 130 171 182 178 L 184 286 C 188 330 202 500 208 560 Z" fill="url(#white)" stroke="#5f625e" stroke-width="1.5"/>
<line x1="74" y1="400" x2="186" y2="400" stroke="#7d807c" stroke-width="1"/>

<!-- shaft window -->
<g><rect x="150" y="330" width="38" height="48" rx="2" fill="#e8e8e2" stroke="#7e817c" stroke-width="1.5"/><rect x="154" y="334" width="30" height="40" fill="url(#glass)"/><g stroke="#e8e8e2" stroke-width="2.4"><line x1="169" y1="334" x2="169" y2="374"/><line x1="154" y1="354" x2="184" y2="354"/></g></g>

<!-- slate dome cap + deck -->
<rect x="80" y="146" width="100" height="12" rx="3" fill="url(#steel)" stroke="#5f625e" stroke-width="1.5"/>
<path d="M 84 148 Q 84 116 120 110 L 144 110 Q 176 116 176 148 Z" fill="url(#slate)" stroke="#444b57" stroke-width="1.5"/>
<ellipse cx="106" cy="124" rx="20" ry="7" fill="#ffffff" opacity="0.18"/>

<!-- roof boiler drum peeking behind, right + finial -->
<g>
<rect x="148" y="104" width="64" height="22" rx="11" fill="url(#cop)" stroke="#5a3a1c" stroke-width="1.2"/>
<ellipse cx="212" cy="115" rx="7" ry="11" fill="#caa46e" stroke="#5a3a1c" stroke-width="1"/>
<line x1="120" y1="110" x2="120" y2="84" stroke="#6a7079" stroke-width="2.2"/><circle cx="120" cy="83" r="2.4" fill="#787e86"/>
</g>

<!-- orange corbelled bay (projects left) with arched window -->
<g>
<path d="M 60 176 C 46 202 44 252 56 280 L 146 280 C 152 252 152 202 146 176 Z" fill="url(#o)" stroke="#5e2c0a" stroke-width="2"/>
<path d="M 56 280 L 146 280 L 124 314 L 86 314 Z" fill="url(#steel)" stroke="#5f625e" stroke-width="1.2"/>
<path d="M 72 256 L 72 200 A 27 27 0 0 1 126 200 L 126 256 Z" fill="#e9e8e1" stroke="#7e817c" stroke-width="1.8"/>
<path d="M 78 253 L 78 201 A 21 21 0 0 1 120 201 L 120 253 Z" fill="url(#glass)"/>
<g stroke="#e9e8e1" stroke-width="2.4"><line x1="92" y1="180" x2="92" y2="253"/><line x1="106" y1="178" x2="106" y2="253"/><line x1="78" y1="226" x2="120" y2="226"/></g>
<path d="M 78 201 A 21 21 0 0 1 120 201" fill="none" stroke="#e9e8e1" stroke-width="2.4"/>
</g>

<!-- door + red crate at foot -->
<g><rect x="84" y="488" width="44" height="72" rx="3" fill="url(#steel)" stroke="#5f625e" stroke-width="1.5"/><rect x="90" y="494" width="32" height="66" fill="#b1402a"/><line x1="106" y1="494" x2="106" y2="560" stroke="#7a1f16" stroke-width="1.2"/></g>
<g><rect x="138" y="534" width="38" height="24" rx="2" fill="#c0392b" stroke="#7a1f16" stroke-width="1.2"/><line x1="157" y1="534" x2="157" y2="558" stroke="#7a1f16" stroke-width="1"/><line x1="138" y1="546" x2="176" y2="546" stroke="#7a1f16" stroke-width="1"/></g>

<!-- flared foot -->
<path d="M 46 560 L 56 542 Q 94 548 130 544 Q 170 548 204 542 L 214 560 Z" fill="url(#steel)" stroke="#5f625e" stroke-width="1.5"/>
</svg>
