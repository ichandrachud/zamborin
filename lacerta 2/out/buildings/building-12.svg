<rect x="150" y="188" width="20" height="16" rx="3" fill="url(#steel)" stroke="#5f625e" stroke-width="1"/>
<ellipse cx="212" cy="196" rx="14" ry="9" fill="url(#dome)" stroke="#444b57" stroke-width="1"/>
<line x1="196" y1="180" x2="196" y2="160" stroke="#6a7079" stroke-width="2.2"/><circle cx="196" cy="159" r="2.2" fill="#787e86"/>
<!-- arched/oval windows -->
<g><path d="M 130 320 L 130 270 A 22 22 0 0 1 174 270 L 174 320 Z" fill="#e8e8e2" stroke="#7e817c" stroke-width="1.5"/><path d="M 135 272 A 17 17 0 0 1 169 272 L 169 316 L 135 316 Z" fill="url(#glass)"/><line x1="152" y1="255" x2="152" y2="316" stroke="#e8e8e2" stroke-width="2.2"/></g>
<g><path d="M 198 320 L 198 270 A 22 22 0 0 1 242 270 L 242 320 Z" fill="#e8e8e2" stroke="#7e817c" stroke-width="1.5"/><path d="M 203 272 A 17 17 0 0 1 237 272 L 237 316 L 203 316 Z" fill="url(#glass)"/><line x1="220" y1="255" x2="220" y2="316" stroke="#e8e8e2" stroke-width="2.2"/></g>
<g><ellipse cx="164" cy="400" rx="24" ry="18" fill="#e8e8e2" stroke="#7e817c" stroke-width="1.5"/><ellipse cx="164" cy="400" rx="19" ry="13" fill="url(#glass)"/><line x1="164" y1="383" x2="164" y2="417" stroke="#e8e8e2" stroke-width="2"/><line x1="145" y1="400" x2="183" y2="400" stroke="#e8e8e2" stroke-width="2"/></g>
<!-- pipe -->
<path d="M 256 320 L 256 250 Q 256 244 250 244" fill="none" stroke="#5e6573" stroke-width="5"/><path d="M 256 320 L 258 522" fill="none" stroke="url(#steel)" stroke-width="5"/>
<!-- door -->
<g><rect x="196" y="476" width="48" height="84" rx="3" fill="url(#steel)" stroke="#5f625e" stroke-width="1.5"/><rect x="202" y="482" width="36" height="78" fill="#465062"/><line x1="220" y1="482" x2="220" y2="560" stroke="#2e3540" stroke-width="1.2"/></g>
