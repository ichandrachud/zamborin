<path d="M 112 234 Q 196 178 280 234 Z" fill="url(#dome)" stroke="#444b57" stroke-width="1.5"/>
<ellipse cx="160" cy="212" rx="34" ry="9" fill="#ffffff" opacity="0.16"/>
