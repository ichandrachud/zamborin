<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 600" width="300" height="600">
<defs>
<linearGradient id="slate" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#6c7686"/><stop offset="0.5" stop-color="#9aa4b2"/><stop offset="1" stop-color="#6c7686"/></linearGradient>
<linearGradient id="slate2" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#626c7c"/><stop offset="0.5" stop-color="#8e98a6"/><stop offset="1" stop-color="#626c7c"/></linearGradient>
<linearGradient id="steel" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#828891"/><stop offset="0.5" stop-color="#c9ced3"/><stop offset="1" stop-color="#828891"/></linearGradient>
<linearGradient id="dome" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#717b8a"/><stop offset="0.5" stop-color="#aab3c0"/><stop offset="1" stop-color="#6a7482"/></linearGradient>
<linearGradient id="glass" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#c4d2da"/><stop offset="1" stop-color="#7c8b96"/></linearGradient>
</defs>
<line x1="0" y1="560" x2="300" y2="560" stroke="#b4b6b3" stroke-width="2"/>
<!-- left smaller slate tower (red dome) -->
<path d="M 30 560 L 28 230 Q 64 224 100 230 L 98 560 Z" fill="url(#slate2)" stroke="#444b57" stroke-width="1.5"/>
<path d="M 28 232 Q 64 204 100 232 Z" fill="#b8442f" stroke="#5e1c12" stroke-width="1.5"/>
<g><rect x="44" y="270" width="38" height="34" rx="2" fill="#d07a2c" stroke="#8a5316" stroke-width="1.6"/><g stroke="#8a5316" stroke-width="2"><line x1="48" y1="278" x2="78" y2="278"/><line x1="48" y1="286" x2="78" y2="286"/><line x1="48" y1="294" x2="78" y2="294"/></g></g>
<!-- main slate house complex (right) -->
<path d="M 96 560 C 100 500 110 360 114 300 L 116 232 Q 196 222 276 232 L 278 300 C 282 360 288 500 292 560 Z" fill="url(#slate)" stroke="#444b57" stroke-width="1.5"/>
