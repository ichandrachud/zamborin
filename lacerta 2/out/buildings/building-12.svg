<path d="M 26 560 L 36 542 Q 70 547 100 544 L 98 560 Z" fill="url(#steel)" stroke="#5f625e" stroke-width="1.2"/>
<path d="M 92 560 L 102 542 Q 160 548 200 544 Q 250 548 286 542 L 296 560 Z" fill="url(#steel)" stroke="#5f625e" stroke-width="1.5"/>
