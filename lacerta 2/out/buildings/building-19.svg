<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 600" width="220" height="600">
<defs>
<linearGradient id="red" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#a8341f"/><stop offset="0.5" stop-color="#d6543c"/><stop offset="1" stop-color="#a8341f"/></linearGradient>
<linearGradient id="steel" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#828891"/><stop offset="0.5" stop-color="#c9ced3"/><stop offset="1" stop-color="#828891"/></linearGradient>
<linearGradient id="dome" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#717b8a"/><stop offset="0.5" stop-color="#aab3c0"/><stop offset="1" stop-color="#6a7482"/></linearGradient>
<linearGradient id="glass" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#c4d2da"/><stop offset="1" stop-color="#7c8b96"/></linearGradient>
</defs>
<line x1="0" y1="560" x2="220" y2="560" stroke="#b4b6b3" stroke-width="2"/>
<!-- red tower -->
<path d="M 46 560 C 52 502 64 320 68 250 L 70 160 Q 110 153 150 160 L 152 250 C 156 320 168 502 174 560 Z" fill="url(#red)" stroke="#5e1c12" stroke-width="1.5"/>
<line x1="68" y1="370" x2="152" y2="370" stroke="#7a2418" stroke-width="1"/>
<!-- steel deck + main dome -->
<rect x="62" y="146" width="96" height="12" rx="3" fill="url(#steel)" stroke="#5f625e" stroke-width="1.5"/>
<path d="M 66 148 Q 66 120 110 114 Q 154 120 154 148 Z" fill="url(#dome)" stroke="#444b57" stroke-width="1.5"/>
<!-- small domed cupola turret on top-left -->
<rect x="74" y="100" width="24" height="16" rx="2" fill="url(#steel)" stroke="#5f625e" stroke-width="1.2"/>
<path d="M 74 102 Q 86 86 98 102 Z" fill="url(#dome)" stroke="#444b57" stroke-width="1.2"/>
<line x1="86" y1="90" x2="86" y2="74" stroke="#6a7079" stroke-width="2"/><circle cx="86" cy="73" r="2" fill="#787e86"/>
<!-- arched windows -->
<g><path d="M 78 250 L 78 208 A 18 18 0 0 1 114 208 L 114 250 Z" fill="#e8e8e2" stroke="#7e817c" stroke-width="1.5"/><path d="M 82 210 A 14 14 0 0 1 110 210 L 110 246 L 82 246 Z" fill="url(#glass)"/><line x1="96" y1="194" x2="96" y2="246" stroke="#e8e8e2" stroke-width="2.2"/></g>
<g><rect x="80" y="300" width="36" height="50" rx="2" fill="#e8e8e2" stroke="#7e817c" stroke-width="1.5"/><rect x="84" y="304" width="28" height="42" fill="url(#glass)"/><g stroke="#e8e8e2" stroke-width="2.2"><line x1="98" y1="304" x2="98" y2="346"/><line x1="84" y1="325" x2="112" y2="325"/></g></g>
<!-- door -->
<g><rect x="88" y="486" width="44" height="74" rx="3" fill="url(#steel)" stroke="#5f625e" stroke-width="1.5"/><rect x="94" y="492" width="32" height="68" fill="#6f9152"/><line x1="110" y1="492" x2="110" y2="560" stroke="#42592f" stroke-width="1.2"/></g>
<!-- foot -->
<path d="M 42 560 L 52 542 Q 90 548 110 544 Q 150 548 178 542 L 178 560 Z" fill="url(#steel)" stroke="#5f625e" stroke-width="1.5"/>
</svg>
