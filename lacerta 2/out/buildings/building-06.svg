<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 600" width="300" height="600">
<defs>
<linearGradient id="white" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#a9aca8"/><stop offset="0.5" stop-color="#d9d9d3"/><stop offset="1" stop-color="#a9aca8"/></linearGradient>
<linearGradient id="white2" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#9ea19d"/><stop offset="0.5" stop-color="#cccdc7"/><stop offset="1" stop-color="#9ea19d"/></linearGradient>
<linearGradient id="steel" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#828891"/><stop offset="0.5" stop-color="#c9ced3"/><stop offset="1" stop-color="#828891"/></linearGradient>
<linearGradient id="slate" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#6c7686"/><stop offset="0.5" stop-color="#9aa4b2"/><stop offset="1" stop-color="#6c7686"/></linearGradient>
<linearGradient id="glass" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#c4d2da"/><stop offset="1" stop-color="#7c8b96"/></linearGradient>
</defs>

<line x1="0" y1="560" x2="300" y2="560" stroke="#b4b6b3" stroke-width="2"/>

